<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Banner Compacto</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.mini-banner {
    display: flex;
    flex-direction: column;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.12);
    max-width: 480px;
    width: 95%;
    text-decoration: none;
    color: inherit;
    overflow: hidden;
    padding: 6px 8px;

    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.mini-banner:hover {
    transform: scale(1.02);
    box-shadow: 0 6px 14px rgba(0,0,0,0.18);
}

/* LABEL DENTRO DO BANNER */
.ad-label {
    font-size: 0.7em;
    color: #888;
    margin-bottom: 4px;
}

/* LINHA PRINCIPAL */
.banner-content {
    display: flex;
    align-items: center;
    gap: 10px;
}

.banner-content img {
    width: 90px;
    height: 70px;
    object-fit: cover;
    object-position: center;
    border-radius: 6px;
    flex-shrink: 0;
}

.text {
    display: flex;
    flex-direction: column;
}

.text h1 {
    font-size: 0.95em;
    margin: 0 0 4px 0;
    color: #4a2f0e;
}

.text p {
    font-size: 0.82em;
    color: #555;
    margin: 0;
    line-height: 1.25;

    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

@media (max-width: 400px) {
    .banner-content {
        flex-direction: column;
        align-items: flex-start;
    }

    .banner-content img {
        width: 100%;
        height: 120px;
    }

    .text p {
        -webkit-line-clamp: 2;
    }
}
</style>
</head>

<body>

<a href="https://wa.me/5585987106166?text=Ol%C3%A1%2C%20quero%20anunciar.%20Como%20fa%C3%A7o%3F" target="_blank" class="mini-banner">
    
    <div class="ad-label">Anúncio:</div>

    <div class="banner-content">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQwgKpo_vqS5UOtCPTYXMCfvFZcFNvstDGsyA&s" alt="Bolo de Chocolate">
        
        <div class="text">
            <h1>Seu projeto, sua marca, seu negócio!</h1>
            <p>
                Seus projetos cripto, sites de investimento e lançamentos de criptomoedas para todo o mundo aqui!
            </p>
        </div>
        </div>

</a>

</body>
</html>
